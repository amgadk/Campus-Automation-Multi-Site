---
- name: Deploy WAN & Host configurations
  hosts: "{{ target_hosts }}"
  gather_facts: false

  tasks:

    - name: Import Global Vars
      ansible.builtin.include_vars: "{{ item }}"
      with_items:
        - "../group_vars/global.yml"

    - name: load configuration from file
      arista.eos.eos_config:
        src: ../host_configs/{{inventory_hostname}}.cfg
        replace: line

# CloudVision onboarding + tags for lab host/endpoint devices.
# These devices are not part of the AVD fabric inventory/eos_designs pipeline,
# so they never receive metadata.cv_tags. On the installed AVD version (6.0.0),
# cv_deploy's cv_workflow module has no "read tags from Ansible vars" mode at
# all (that only exists in newer/unreleased AVD) - it always reads structured
# config, including CloudVision tags, from a real file at
# {{ structured_dir }}/<hostname>.yml (metadata.cv_tags.device_tags key).
# eos_config_dir and structured_dir are both pointed at host_configs/ (instead
# of the default intended/configs and intended/structured_configs, which are
# never generated for these devices) so cv_deploy finds:
#   - host_configs/<hostname>.cfg for the flat-layout configlet (already
#     applied to the device above via eos_config)
#   - host_configs/<hostname>.yml for the CloudVision device tags
- name: Tag host/endpoint devices on CloudVision
  hosts: "{{ target_hosts }}"
  connection: local
  gather_facts: false

  vars:
    eos_config_dir: "{{ inventory_dir }}"
    structured_dir: "{{ inventory_dir }}"

  tasks:
    - name: Deploy CloudVision tags for lab host/endpoint devices
      ansible.builtin.import_role:
        name: arista.avd.cv_deploy
