- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.112/24
  type: oob
metadata:
  is_deployed: true
  platform: vEOS-lab
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
  cv_tags:
    device_tags:
    - name: topology_hint_network_type
      value: campusV2
    - name: topology_hint_type
      value: Spine
    - name: Role
      value: Spine
    - name: Campus
      value: ACME-AU
    - name: Campus-Pod
      value: CAMPUS1
    interface_tags:
