        value: AVD-Managed
      - name: Link-Type
        value: Management
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.10.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65000'
  router_id: 10.255.10.101
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.10.201.155
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: c1-leaf1
    description: c1-leaf1_Ethernet2
  - ip_address: 10.10.201.159
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: c1-leaf2
    description: c1-leaf2_Ethernet2
  - ip_address: 10.10.201.163
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: c1-leaf3
    description: c1-leaf3_Ethernet2
  - ip_address: 10.10.201.167
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65204'
    metadata:
      peer: c1-leaf4
    description: c1-leaf4_Ethernet2
  - ip_address: 10.10.201.171
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: c1-leaf5
    description: c1-leaf5_Ethernet2
  - ip_address: 10.10.201.175
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65206'
    metadata:
      peer: c1-leaf6
    description: c1-leaf6_Ethernet2
  - ip_address: 10.10.201.179
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: c1-borderleaf1
    description: c1-borderleaf1_Ethernet2
  - ip_address: 10.10.201.183
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: c1-borderleaf2
    description: c1-borderleaf2_Ethernet2
  - ip_address: 10.255.10.109
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: c1-borderleaf1
    description: c1-borderleaf1_Loopback0
  - ip_address: 10.255.10.110
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: c1-borderleaf2
    description: c1-borderleaf2_Loopback0
  - ip_address: 10.255.10.103
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65202'
    metadata:
      peer: c1-leaf1
    description: c1-leaf1_Loopback0
  - ip_address: 10.255.10.104
