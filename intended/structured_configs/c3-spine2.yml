    description: c3-borderleaf2_Ethernet2
  - ip_address: 10.255.30.138
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65320'
    metadata:
      peer: c3-borderleaf1
    description: c3-borderleaf1_Loopback0
  - ip_address: 10.255.30.139
    peer_group: EVPN-OVERLAY-PEERS
