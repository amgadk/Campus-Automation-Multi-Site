prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.30.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65030'
  router_id: 10.255.30.131
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.30.202.15
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65231'
    metadata:
      peer: c3-leaf1
    description: c3-leaf1_Ethernet2
  - ip_address: 10.30.202.19
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65231'
    metadata:
      peer: c3-leaf2
    description: c3-leaf2_Ethernet2
  - ip_address: 10.30.202.23
    peer_group: IPv4-UNDERLAY-PEERS
