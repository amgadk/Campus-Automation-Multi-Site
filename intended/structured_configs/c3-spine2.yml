    metadata:
      peer: c3-leaf4
    description: c3-leaf4_Ethernet2
  - ip_address: 10.30.202.31
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65235'
    metadata:
      peer: c3-leaf5
    description: c3-leaf5_Ethernet2
  - ip_address: 10.30.202.35
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65235'
    metadata:
      peer: c3-leaf6
    description: c3-leaf6_Ethernet2
  - ip_address: 10.30.202.39
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65320'
    metadata:
      peer: c3-borderleaf1
    description: c3-borderleaf1_Ethernet2
  - ip_address: 10.30.202.43
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65320'
    metadata:
