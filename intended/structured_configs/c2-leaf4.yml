mlag_configuration:
  domain_id: mlag22
  local_interface: Vlan4094
  peer_address: 10.120.20.246
  peer_link: Port-Channel5
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel5
  description: MLAG_c2-leaf3_Port-Channel5
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel7
  description: PortChannel c2-IOT-H3
  shutdown: false
  mlag: 7
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 301
- name: Port-Channel9
  description: PortChannel c2-Sales-H4
  shutdown: false
  mlag: 9
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 401
- name: Port-Channel10
  description: PortChannel c2-Sales-H11
  shutdown: false
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 401
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.20.0/24 eq 32
  - sequence: 20
    action: permit 10.255.2.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.220.0.246/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65223'
  router_id: 10.255.20.125
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65223'
    description: c2-leaf3
    next_hop_self: true
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.220.0.246
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: c2-leaf3
    description: c2-leaf3_Vlan4093
  - ip_address: 10.20.201.240
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65010'
    metadata:
      peer: c2-spine1
    description: c2-spine1_Ethernet4
  - ip_address: 10.20.201.242
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65010'
    metadata:
      peer: c2-spine2
    description: c2-spine2_Ethernet4
  - ip_address: 10.255.20.120
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65010'
    metadata:
      peer: c2-spine1
    description: c2-spine1_Loopback0
  - ip_address: 10.255.20.121
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65010'
    metadata:
      peer: c2-spine2
    description: c2-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 101
    metadata:
      tenants:
      - ACME
    rd: 10.255.20.125:2101
    route_targets:
      both:
      - 2101:2101
    redistribute_routes:
    - learned
  - id: 201
    metadata:
      tenants:
      - ACME
    rd: 10.255.20.125:2201
    route_targets:
      both:
      - 2201:2201
    redistribute_routes:
    - learned
  - id: 301
    metadata:
      tenants:
      - ACME
    rd: 10.255.20.125:2301
    route_targets:
      both:
      - 2301:2301
    redistribute_routes:
    - learned
  - id: 401
    metadata:
      tenants:
      - ACME
    rd: 10.255.20.125:2401
    route_targets:
      both:
      - 2401:2401
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - ACME
    rd: 10.255.20.125:2020
    route_targets:
      both:
      - 2020:2020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: VRF-C
    rd: 10.255.20.125:7777
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - 7777:7777
      export:
      - address_family: evpn
        route_targets:
        - 7777:7777
    router_id: 10.255.20.125
    neighbors:
    - ip_address: 10.220.0.246
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: c2-leaf3_Vlan3777
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
  - name: VRF-S
    rd: 10.255.20.125:8888
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - 8888:8888
      export:
      - address_family: evpn
        route_targets:
        - 8888:8888
    router_id: 10.255.20.125
    neighbors:
    - ip_address: 10.220.0.246
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: c2-leaf3_Vlan3888
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
