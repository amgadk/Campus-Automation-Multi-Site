metadata:
  is_deployed: true
  platform: vEOS-lab
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
  cv_tags:
    device_tags:
    - name: topology_hint_network_type
      value: campusV2
    - name: topology_hint_type
      value: Leaf
    - name: Role
      value: Leaf
    - name: Campus
      value: ACME-AU
    - name: Campus-Pod
      value: CAMPUS3
    interface_tags:
    - interface: Ethernet5
      tags:
      - name: Link-Type
        value: AVD-Managed
      - name: Link-Type
        value: Fabric
      - name: Link-Type
        value: MLAG
    - interface: Ethernet6
      tags:
      - name: Link-Type
        value: AVD-Managed
      - name: Link-Type
        value: Fabric
      - name: Link-Type
        value: MLAG
    - interface: Ethernet1
      tags:
      - name: Link-Type
        value: AVD-Managed
      - name: Link-Type
        value: Fabric
      - name: Link-Type
        value: Uplink
    - interface: Ethernet2
      tags:
      - name: Link-Type
        value: AVD-Managed
      - name: Link-Type
        value: Fabric
      - name: Link-Type
        value: Uplink
    - interface: Ethernet12
      tags:
      - name: Link-Type
        value: AVD-Managed
    - interface: Ethernet11
      tags:
      - name: Link-Type
        value: AVD-Managed
    - interface: Management1
      tags:
      - name: Link-Type
        value: AVD-Managed
      - name: Link-Type
        value: Management
mlag_configuration:
  domain_id: c3-borderleafs
  local_interface: Vlan4094
  peer_address: 10.130.29.19
  peer_link: Port-Channel5
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel5
  description: MLAG_c3-borderleaf2_Port-Channel5
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.30.0/24 eq 32
  - sequence: 20
    action: permit 10.255.1.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.230.1.18/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65320'
  router_id: 10.255.30.138
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65320'
    description: c3-borderleaf2
    next_hop_self: true
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.230.1.19
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: c3-borderleaf2
    description: c3-borderleaf2_Vlan4093
  - ip_address: 10.30.202.36
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65030'
    metadata:
      peer: c3-spine1
    description: c3-spine1_Ethernet7
  - ip_address: 10.30.202.38
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65030'
    metadata:
      peer: c3-spine2
    description: c3-spine2_Ethernet7
  - ip_address: 10.255.30.130
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65030'
    metadata:
      peer: c3-spine1
    description: c3-spine1_Loopback0
  - ip_address: 10.255.30.131
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65030'
    metadata:
      peer: c3-spine2
    description: c3-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 101
    metadata:
      tenants:
      - ACME
    rd: 10.255.30.138:2101
    route_targets:
      both:
      - 2101:2101
    redistribute_routes:
    - learned
  - id: 201
    metadata:
      tenants:
      - ACME
    rd: 10.255.30.138:2201
    route_targets:
      both:
      - 2201:2201
    redistribute_routes:
    - learned
  - id: 301
    metadata:
      tenants:
      - ACME
    rd: 10.255.30.138:2301
    route_targets:
      both:
      - 2301:2301
    redistribute_routes:
    - learned
  - id: 401
    metadata:
      tenants:
      - ACME
    rd: 10.255.30.138:2401
    route_targets:
      both:
      - 2401:2401
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - ACME
    rd: 10.255.30.138:2020
    route_targets:
      both:
      - 2020:2020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: VRF-C
    rd: 10.255.30.138:7777
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - 7777:7777
      export:
      - address_family: evpn
        route_targets:
        - 7777:7777
    router_id: 10.255.30.138
    neighbors:
    - ip_address: 10.230.1.19
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: c3-borderleaf2_Vlan3777
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
  - name: VRF-S
    rd: 10.255.30.138:8888
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - 8888:8888
      export:
      - address_family: evpn
        route_targets:
        - 8888:8888
    router_id: 10.255.30.138
    neighbors:
    - ip_address: 10.230.1.19
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: c3-borderleaf2_Vlan3888
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
      static:
        enabled: true
