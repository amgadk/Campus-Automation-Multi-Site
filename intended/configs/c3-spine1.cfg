!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname c3-spine1
!
spanning-tree mode none
!
interface Ethernet1
   description P2P_c3-leaf1_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.12/31
!
interface Ethernet2
   description P2P_c3-leaf2_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.16/31
!
interface Ethernet3
   description P2P_c3-leaf3_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.20/31
!
interface Ethernet4
   description P2P_c3-leaf4_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.24/31
!
interface Ethernet5
   description P2P_c3-leaf5_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.28/31
!
interface Ethernet6
   description P2P_c3-leaf6_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.32/31
!
interface Ethernet7
   description P2P_c3-borderleaf1_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.36/31
!
interface Ethernet8
   description P2P_c3-borderleaf2_Ethernet1
   no shutdown
   mtu 1550
   no switchport
   ip address 10.30.202.40/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.30.130/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.115/24
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.30.0/24 eq 32
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65030
   router-id 10.255.30.130
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.30.202.13 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.13 remote-as 65231
   neighbor 10.30.202.13 description c3-leaf1_Ethernet1
   neighbor 10.30.202.17 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.17 remote-as 65231
   neighbor 10.30.202.17 description c3-leaf2_Ethernet1
   neighbor 10.30.202.21 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.21 remote-as 65233
   neighbor 10.30.202.21 description c3-leaf3_Ethernet1
   neighbor 10.30.202.25 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.25 remote-as 65233
   neighbor 10.30.202.25 description c3-leaf4_Ethernet1
   neighbor 10.30.202.29 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.29 remote-as 65235
   neighbor 10.30.202.29 description c3-leaf5_Ethernet1
   neighbor 10.30.202.33 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.33 remote-as 65235
   neighbor 10.30.202.33 description c3-leaf6_Ethernet1
   neighbor 10.30.202.37 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.37 remote-as 65320
   neighbor 10.30.202.37 description c3-borderleaf1_Ethernet1
   neighbor 10.30.202.41 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.30.202.41 remote-as 65320
   neighbor 10.30.202.41 description c3-borderleaf2_Ethernet1
   neighbor 10.255.30.132 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.132 remote-as 65231
   neighbor 10.255.30.132 description c3-leaf1_Loopback0
   neighbor 10.255.30.133 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.133 remote-as 65231
   neighbor 10.255.30.133 description c3-leaf2_Loopback0
   neighbor 10.255.30.134 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.134 remote-as 65233
   neighbor 10.255.30.134 description c3-leaf3_Loopback0
   neighbor 10.255.30.135 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.135 remote-as 65233
   neighbor 10.255.30.135 description c3-leaf4_Loopback0
   neighbor 10.255.30.136 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.136 remote-as 65235
   neighbor 10.255.30.136 description c3-leaf5_Loopback0
   neighbor 10.255.30.137 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.137 remote-as 65235
   neighbor 10.255.30.137 description c3-leaf6_Loopback0
   neighbor 10.255.30.138 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.138 remote-as 65320
   neighbor 10.255.30.138 description c3-borderleaf1_Loopback0
   neighbor 10.255.30.139 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.30.139 remote-as 65320
   neighbor 10.255.30.139 description c3-borderleaf2_Loopback0
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
