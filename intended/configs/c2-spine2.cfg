!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname c2-spine2
!
spanning-tree mode none
!
interface Ethernet1
   description P2P_c2-leaf1_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.230/31
!
interface Ethernet2
   description P2P_c2-leaf2_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.234/31
!
interface Ethernet3
   description P2P_c2-leaf3_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.238/31
!
interface Ethernet4
   description P2P_c2-leaf4_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.242/31
!
interface Ethernet5
   description P2P_c2-leaf5_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.246/31
!
interface Ethernet6
   description P2P_c2-leaf6_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.250/31
!
interface Ethernet7
   description P2P_c2-borderleaf1_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.201.254/31
!
interface Ethernet8
   description P2P_c2-borderleaf2_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.20.202.2/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.20.121/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.114/24
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.20.0/24 eq 32
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65010
   router-id 10.255.20.121
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.20.201.231 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.231 remote-as 65221
   neighbor 10.20.201.231 description c2-leaf1_Ethernet2
   neighbor 10.20.201.235 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.235 remote-as 65221
   neighbor 10.20.201.235 description c2-leaf2_Ethernet2
   neighbor 10.20.201.239 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.239 remote-as 65223
   neighbor 10.20.201.239 description c2-leaf3_Ethernet2
   neighbor 10.20.201.243 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.243 remote-as 65223
   neighbor 10.20.201.243 description c2-leaf4_Ethernet2
   neighbor 10.20.201.247 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.247 remote-as 65225
   neighbor 10.20.201.247 description c2-leaf5_Ethernet2
   neighbor 10.20.201.251 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.251 remote-as 65225
   neighbor 10.20.201.251 description c2-leaf6_Ethernet2
   neighbor 10.20.201.255 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.201.255 remote-as 65320
   neighbor 10.20.201.255 description c2-borderleaf1_Ethernet2
   neighbor 10.20.202.3 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.20.202.3 remote-as 65320
   neighbor 10.20.202.3 description c2-borderleaf2_Ethernet2
   neighbor 10.255.20.122 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.122 remote-as 65221
   neighbor 10.255.20.122 description c2-leaf1_Loopback0
   neighbor 10.255.20.123 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.123 remote-as 65221
   neighbor 10.255.20.123 description c2-leaf2_Loopback0
   neighbor 10.255.20.124 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.124 remote-as 65223
   neighbor 10.255.20.124 description c2-leaf3_Loopback0
   neighbor 10.255.20.125 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.125 remote-as 65223
   neighbor 10.255.20.125 description c2-leaf4_Loopback0
   neighbor 10.255.20.126 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.126 remote-as 65225
   neighbor 10.255.20.126 description c2-leaf5_Loopback0
   neighbor 10.255.20.127 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.127 remote-as 65225
   neighbor 10.255.20.127 description c2-leaf6_Loopback0
   neighbor 10.255.20.128 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.128 remote-as 65320
   neighbor 10.255.20.128 description c2-borderleaf1_Loopback0
   neighbor 10.255.20.129 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.20.129 remote-as 65320
   neighbor 10.255.20.129 description c2-borderleaf2_Loopback0
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
