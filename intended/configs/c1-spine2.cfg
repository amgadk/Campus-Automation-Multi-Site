!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname c1-spine2
!
spanning-tree mode none
!
interface Ethernet1
   description P2P_c1-leaf1_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.154/31
!
interface Ethernet2
   description P2P_c1-leaf2_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.158/31
!
interface Ethernet3
   description P2P_c1-leaf3_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.162/31
!
interface Ethernet4
   description P2P_c1-leaf4_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.166/31
!
interface Ethernet5
   description P2P_c1-leaf5_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.170/31
!
interface Ethernet6
   description P2P_c1-leaf6_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.174/31
!
interface Ethernet7
   description P2P_c1-borderleaf1_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.178/31
!
interface Ethernet8
   description P2P_c1-borderleaf2_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.182/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.10.101/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.112/24
!
ip routing
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.10.0/24 eq 32
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65000
   router-id 10.255.10.101
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 10.10.201.155 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.155 remote-as 65202
   neighbor 10.10.201.155 description c1-leaf1_Ethernet2
   neighbor 10.10.201.159 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.159 remote-as 65202
   neighbor 10.10.201.159 description c1-leaf2_Ethernet2
   neighbor 10.10.201.163 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.163 remote-as 65204
   neighbor 10.10.201.163 description c1-leaf3_Ethernet2
   neighbor 10.10.201.167 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.167 remote-as 65204
   neighbor 10.10.201.167 description c1-leaf4_Ethernet2
   neighbor 10.10.201.171 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.171 remote-as 65206
   neighbor 10.10.201.171 description c1-leaf5_Ethernet2
   neighbor 10.10.201.175 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.175 remote-as 65206
   neighbor 10.10.201.175 description c1-leaf6_Ethernet2
   neighbor 10.10.201.179 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.179 remote-as 65300
   neighbor 10.10.201.179 description c1-borderleaf1_Ethernet2
   neighbor 10.10.201.183 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.183 remote-as 65300
   neighbor 10.10.201.183 description c1-borderleaf2_Ethernet2
   neighbor 10.255.10.103 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.103 remote-as 65202
   neighbor 10.255.10.103 description c1-leaf1_Loopback0
   neighbor 10.255.10.104 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.104 remote-as 65202
   neighbor 10.255.10.104 description c1-leaf2_Loopback0
   neighbor 10.255.10.105 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.105 remote-as 65204
   neighbor 10.255.10.105 description c1-leaf3_Loopback0
   neighbor 10.255.10.106 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.106 remote-as 65204
   neighbor 10.255.10.106 description c1-leaf4_Loopback0
   neighbor 10.255.10.107 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.107 remote-as 65206
   neighbor 10.255.10.107 description c1-leaf5_Loopback0
   neighbor 10.255.10.108 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.108 remote-as 65206
   neighbor 10.255.10.108 description c1-leaf6_Loopback0
   neighbor 10.255.10.109 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.109 remote-as 65300
   neighbor 10.255.10.109 description c1-borderleaf1_Loopback0
   neighbor 10.255.10.110 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.110 remote-as 65300
   neighbor 10.255.10.110 description c1-borderleaf2_Loopback0
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
