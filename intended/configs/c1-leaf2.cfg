!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname c1-leaf2
!
spanning-tree mode mstp
no spanning-tree vlan-id 4093-4094
spanning-tree mst 0 priority 16384
!
vlan 20
   name Internal
!
vlan 101
   name STAFF_NW
!
vlan 201
   name MEDIA_NW
!
vlan 301
   name IOT_NW
!
vlan 401
   name SALES_NW
!
vlan 3777
   name MLAG_L3_VRF_VRF-C
   trunk group MLAG
!
vlan 3888
   name MLAG_L3_VRF_VRF-S
   trunk group MLAG
!
vlan 4093
   name MLAG_L3
   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance VRF-C
!
vrf instance VRF-S
!
interface Port-Channel5
   description MLAG_c1-leaf1_Port-Channel5
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Port-Channel7
   description PortChannel c1-Staff-H1
   no shutdown
   switchport access vlan 101
   switchport mode access
   switchport
   mlag 7
   spanning-tree portfast
!
interface Port-Channel9
   description PortChannel c1-Media-H2
   no shutdown
   switchport access vlan 201
   switchport mode access
   switchport
   mlag 9
   spanning-tree portfast
!
interface Port-Channel10
   description PortChannel c1-Staff-H9
   no shutdown
   switchport access vlan 101
   switchport mode access
   switchport
   spanning-tree portfast
!
interface Ethernet1
   description P2P_c1-spine1_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.157/31
!
interface Ethernet2
   description P2P_c1-spine2_Ethernet2
   no shutdown
   mtu 1550
   no switchport
   ip address 10.10.201.159/31
!
interface Ethernet5
   description MLAG_c1-leaf1_Ethernet5
   no shutdown
   channel-group 5 mode active
!
interface Ethernet6
   description MLAG_c1-leaf1_Ethernet6
   no shutdown
   channel-group 5 mode active
!
interface Ethernet7
   description SERVER_c1-Staff-H1_Ethernet2
   no shutdown
   channel-group 7 mode active
!
interface Ethernet9
   description SERVER_c1-Media-H2_Ethernet2
   no shutdown
   channel-group 9 mode active
!
interface Ethernet10
   description SERVER_c1-Staff-H9_Ethernet1
   no shutdown
   channel-group 10 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.10.104/32
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ip address 10.255.1.103/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.102/24
!
interface Vlan20
   description Internal
   no shutdown
   vrf VRF-S
   ip address virtual 10.1.20.1/24
!
interface Vlan101
   description STAFF_NW
   no shutdown
   vrf VRF-C
   ip address 172.16.11.1/24
   ip virtual-router address 172.16.11.254
!
interface Vlan201
   description MEDIA_NW
   no shutdown
   vrf VRF-C
   ip address 172.16.21.1/24
   ip virtual-router address 172.16.21.254
!
interface Vlan301
   description IOT_NW
   no shutdown
   vrf VRF-C
   ip address 172.16.31.1/24
   ip virtual-router address 172.16.31.254
!
interface Vlan401
   description SALES_NW
   no shutdown
   vrf VRF-C
   ip address 172.16.41.1/24
   ip virtual-router address 172.16.41.254
!
interface Vlan3777
   description MLAG_L3_VRF_VRF-C
   no shutdown
   mtu 1550
   vrf VRF-C
   ip address 10.210.0.205/31
!
interface Vlan3888
   description MLAG_L3_VRF_VRF-S
   no shutdown
   mtu 1550
   vrf VRF-S
   ip address 10.210.0.205/31
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 1550
   ip address 10.210.0.205/31
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1550
   no autostate
   ip address 10.110.8.205/31
!
interface Vxlan1
   description c1-leaf2_VTEP
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan vlan 20 vni 2020
   vxlan vlan 101 vni 2101
   vxlan vlan 201 vni 2201
   vxlan vlan 301 vni 2301
   vxlan vlan 401 vni 2401
   vxlan vrf VRF-C vni 7777
   vxlan vrf VRF-S vni 8888
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
ip routing
ip routing vrf VRF-C
ip routing vrf VRF-S
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.10.0/24 eq 32
   seq 20 permit 10.255.1.0/24 eq 32
!
ip prefix-list PL-MLAG-PEER-VRFS
   seq 10 permit 10.210.0.204/31
!
mlag configuration
   domain-id mlag1
   local-interface Vlan4094
   peer-address 10.110.8.204
   peer-link Port-Channel5
   reload-delay mlag 300
   reload-delay non-mlag 330
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
route-map RM-CONN-2-BGP-VRFS deny 10
   match ip address prefix-list PL-MLAG-PEER-VRFS
!
route-map RM-CONN-2-BGP-VRFS permit 20
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65202
   router-id 10.255.10.104
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor MLAG-IPv4-UNDERLAY-PEER peer group
   neighbor MLAG-IPv4-UNDERLAY-PEER remote-as 65202
   neighbor MLAG-IPv4-UNDERLAY-PEER next-hop-self
   neighbor MLAG-IPv4-UNDERLAY-PEER description c1-leaf1
   neighbor MLAG-IPv4-UNDERLAY-PEER route-map RM-MLAG-PEER-IN in
   neighbor MLAG-IPv4-UNDERLAY-PEER send-community
   neighbor MLAG-IPv4-UNDERLAY-PEER maximum-routes 256000
   neighbor 10.10.201.156 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.156 remote-as 65000
   neighbor 10.10.201.156 description c1-spine1_Ethernet2
   neighbor 10.10.201.158 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.10.201.158 remote-as 65000
   neighbor 10.10.201.158 description c1-spine2_Ethernet2
   neighbor 10.210.0.204 peer group MLAG-IPv4-UNDERLAY-PEER
   neighbor 10.210.0.204 description c1-leaf1_Vlan4093
   neighbor 10.255.10.100 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.100 remote-as 65000
   neighbor 10.255.10.100 description c1-spine1_Loopback0
   neighbor 10.255.10.101 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.10.101 remote-as 65000
   neighbor 10.255.10.101 description c1-spine2_Loopback0
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 20
      rd 10.255.10.104:2020
      route-target both 2020:2020
      redistribute learned
   !
   vlan 101
      rd 10.255.10.104:2101
      route-target both 2101:2101
      redistribute learned
   !
   vlan 201
      rd 10.255.10.104:2201
      route-target both 2201:2201
      redistribute learned
   !
   vlan 301
      rd 10.255.10.104:2301
      route-target both 2301:2301
      redistribute learned
   !
   vlan 401
      rd 10.255.10.104:2401
      route-target both 2401:2401
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
      neighbor MLAG-IPv4-UNDERLAY-PEER activate
   !
   vrf VRF-C
      rd 10.255.10.104:7777
      route-target import evpn 7777:7777
      route-target export evpn 7777:7777
      router-id 10.255.10.104
      neighbor 10.210.0.204 peer group MLAG-IPv4-UNDERLAY-PEER
      neighbor 10.210.0.204 description c1-leaf1_Vlan3777
      redistribute connected route-map RM-CONN-2-BGP-VRFS
   !
   vrf VRF-S
      rd 10.255.10.104:8888
      route-target import evpn 8888:8888
      route-target export evpn 8888:8888
      router-id 10.255.10.104
      neighbor 10.210.0.204 peer group MLAG-IPv4-UNDERLAY-PEER
      neighbor 10.210.0.204 description c1-leaf1_Vlan3888
      redistribute connected route-map RM-CONN-2-BGP-VRFS
!
end
