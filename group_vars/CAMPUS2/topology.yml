---
# Spine Switches
spine:
  defaults:
    platform: vEOS-lab
    bgp_as: 65010
    loopback_ipv4_pool: 10.255.20.0/24
    mlag: false
    campus: ACME-AU
    campus_pod: CAMPUS2
  nodes:
    - name: c2-spine1
      id: 120
      mgmt_ip: 192.168.0.113/24
    - name: c2-spine2
      id: 121
      mgmt_ip: 192.168.0.114/24

# Leaf switches. Most leafs will be l3leaf, not l2leaf.
l3leaf:
  defaults:
    bgp_as: 65100-65250 # Gives a range which will be auto-assigned
    platform: vEOS-lab
    loopback_ipv4_pool: 10.255.20.0/24 # This is loopback0 (underlay)
    vtep_loopback_ipv4_pool: 10.255.2.0/24 # This is loopback1 (VTEP)
    uplink_interfaces: [Ethernet1, Ethernet2] # Leaf uplinks
    uplink_switches: [c2-spine1, c2-spine2] # Where the leaf uplinks go
    uplink_ipv4_pool: 10.20.200.0/22 # For the p2p interfaces to chopped up into /31s
    mlag_interfaces: [Ethernet5, Ethernet6] # MLAG peer link
    mlag_peer_ipv4_pool: 10.120.20.0/22 # MLAG peer IPs
    mlag_peer_l3_ipv4_pool: 10.220.0.0/22 # iBGP peering between MLAG peers
    virtual_router_mac_address: 00:1c:73:00:00:99 # The vMAC for the anycast gateways
    spanning_tree_mode: mstp # Spanning Tree is still enabled even in EVPN setups
    spanning_tree_priority: 16384
    mlag: true # By default, use MLAG
    campus: ACME-AU
    campus_pod: CAMPUS2
  node_groups:
    - group: mlag21
      campus_access_pod: C2-POD1
      # bgp_as is configured automatically from the range, but can be overriden
      nodes:
        - name: c2-leaf1
          id: 122
          mgmt_ip: 192.168.0.201/24
          uplink_switch_interfaces: [Ethernet1, Ethernet1]
        - name: c2-leaf2
          id: 123
          mgmt_ip: 192.168.0.202/24
          uplink_switch_interfaces: [Ethernet2, Ethernet2]
    - group: mlag22
      campus_access_pod: C2-POD2
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c2-leaf3
          id: 124
          mgmt_ip: 192.168.0.203/24
          uplink_switch_interfaces: [Ethernet3, Ethernet3]
        - name: c2-leaf4
          id: 125
          mgmt_ip: 192.168.0.204/24
          uplink_switch_interfaces: [Ethernet4, Ethernet4]
    - group: mlag23
      campus_access_pod: C2-POD3
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c2-leaf5
          id: 126
          mgmt_ip: 192.168.0.205/24
          uplink_switch_interfaces: [Ethernet5, Ethernet5]
        - name: c2-leaf6
          id: 127
          mgmt_ip: 192.168.0.206/24
          uplink_switch_interfaces: [Ethernet6, Ethernet6]
    - group: c2-borderleafs
      bgp_as: 65320 # Overriden automatic allocation for BorderLeafs
      nodes:
        - name: c2-borderleaf1
          id: 128
          mgmt_ip: 192.168.0.207/24
          uplink_switch_interfaces: [Ethernet7, Ethernet7]
        - name: c2-borderleaf2
          id: 129
          mgmt_ip: 192.168.0.208/24
          uplink_switch_interfaces: [Ethernet8, Ethernet8]
