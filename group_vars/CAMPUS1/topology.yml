---
# Spine Switches
spine:
  defaults:
    platform: vEOS-lab
    bgp_as: 65000
    loopback_ipv4_pool: 10.255.10.0/24
    mlag: false
    campus: ACME-AU
    campus_pod: CAMPUS1
  nodes:
    - name: c1-spine1
      id: 100
      mgmt_ip: 192.168.0.111/24
    - name: c1-spine2
      id: 101
      mgmt_ip: 192.168.0.112/24

# Leaf switches. Most leafs will be l3leaf, not l2leaf.
l3leaf:
  defaults:
    bgp_as: 65100-65250 # Gives a range which will be auto-assigned
    platform: vEOS-lab
    loopback_ipv4_pool: 10.255.10.0/24 # This is loopback0 (underlay)
    vtep_loopback_ipv4_pool: 10.255.1.0/24 # This is loopback1 (VTEP)
    uplink_interfaces: [Ethernet1, Ethernet2] # Leaf uplinks
    uplink_switches: [c1-spine1, c1-spine2] # Where the leaf uplinks go
    uplink_ipv4_pool: 10.10.200.0/22 # For the p2p interfaces to chopped up into /31s
    mlag_interfaces: [Ethernet5, Ethernet6] # MLAG peer link
    mlag_peer_ipv4_pool: 10.110.10.0/22 # MLAG peer IPs
    mlag_peer_l3_ipv4_pool: 10.210.0.0/22 # iBGP peering between MLAG peers
    virtual_router_mac_address: 00:1c:73:00:00:99 # The vMAC for the anycast gateways
    spanning_tree_mode: mstp # Spanning Tree is still enabled even in EVPN setups
    spanning_tree_priority: 16384
    mlag: true # By default, use MLAG
    campus: ACME-AU
    campus_pod: CAMPUS1
  node_groups:
    - group: mlag1
      campus_access_pod: C1-POD1
      # bgp_as is configured automatically from the range, but can be overriden
      nodes:
        - name: c1-leaf1
          id: 103
          mgmt_ip: 192.168.0.101/24
          uplink_switch_interfaces: [Ethernet1, Ethernet1]
        - name: c1-leaf2
          id: 104
          mgmt_ip: 192.168.0.102/24
          uplink_switch_interfaces: [Ethernet2, Ethernet2]
    - group: mlag2
      campus_access_pod: C1-POD2
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c1-leaf3
          id: 105
          mgmt_ip: 192.168.0.103/24
          uplink_switch_interfaces: [Ethernet3, Ethernet3]
        - name: c1-leaf4
          id: 106
          mgmt_ip: 192.168.0.104/24
          uplink_switch_interfaces: [Ethernet4, Ethernet4]
    - group: mlag3
      campus_access_pod: C1-POD3
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c1-leaf5
          id: 107
          mgmt_ip: 192.168.0.105/24
          uplink_switch_interfaces: [Ethernet5, Ethernet5]
        - name: c1-leaf6
          id: 108
          mgmt_ip: 192.168.0.106/24
          uplink_switch_interfaces: [Ethernet6, Ethernet6]
    - group: c1-borderleafs
      bgp_as: 65300 # Overriden automatic allocation for BorderLeafs
      nodes:
        - name: c1-borderleaf1
          id: 109
          mgmt_ip: 192.168.0.107/24
          uplink_switch_interfaces: [Ethernet7, Ethernet7]
        - name: c1-borderleaf2
          id: 110
          mgmt_ip: 192.168.0.108/24
          uplink_switch_interfaces: [Ethernet8, Ethernet8]
