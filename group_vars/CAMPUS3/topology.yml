---
# Spine Switches
spine:
  defaults:
    platform: vEOS-lab
    bgp_as: 65030
    loopback_ipv4_pool: 10.255.30.0/24
    mlag: false
    campus: ACME-AU
    campus_pod: CAMPUS3
  nodes:
    - name: c3-spine1
      id: 130
      mgmt_ip: 192.168.0.115/24
    - name: c3-spine2
      id: 131
      mgmt_ip: 192.168.0.116/24

# Leaf switches. Most leafs will be l3leaf, not l2leaf.
l3leaf:
  defaults:
    bgp_as: 65100-65250 # Gives a range which will be auto-assigned
    platform: vEOS-lab
    loopback_ipv4_pool: 10.255.30.0/24 # This is loopback0 (underlay)
    vtep_loopback_ipv4_pool: 10.255.1.0/24 # This is loopback1 (VTEP)
    uplink_interfaces: [Ethernet1, Ethernet2] # Leaf uplinks
    uplink_switches: [c3-spine1, c3-spine2] # Where the leaf uplinks go
    uplink_ipv4_pool: 10.30.200.0/22 # For the p2p interfaces to chopped up into /31s
    mlag_interfaces: [Ethernet5, Ethernet6] # MLAG peer link
    mlag_peer_ipv4_pool: 10.130.30.0/22 # MLAG peer IPs
    mlag_peer_l3_ipv4_pool: 10.230.0.0/22 # iBGP peering between MLAG peers
    virtual_router_mac_address: 00:1c:73:00:00:99 # The vMAC for the anycast gateways
    spanning_tree_mode: mstp # Spanning Tree is still enabled even in EVPN setups
    spanning_tree_priority: 16384
    mlag: true # By default, use MLAG
    campus: ACME-AU
    campus_pod: CAMPUS3
  node_groups:
    - group: mlag31
      campus_access_pod: C3-POD1
      # bgp_as is configured automatically from the range, but can be overriden
      nodes:
        - name: c3-leaf1
          id: 132
          mgmt_ip: 192.168.0.131/24
          uplink_switch_interfaces: [Ethernet1, Ethernet1]
        - name: c3-leaf2
          id: 133
          mgmt_ip: 192.168.0.132/24
          uplink_switch_interfaces: [Ethernet2, Ethernet2]
    - group: mlag32
      campus_access_pod: C3-POD2
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c3-leaf3
          id: 134
          mgmt_ip: 192.168.0.133/24
          uplink_switch_interfaces: [Ethernet3, Ethernet3]
        - name: c3-leaf4
          id: 135
          mgmt_ip: 192.168.0.134/24
          uplink_switch_interfaces: [Ethernet4, Ethernet4]
    - group: mlag33
      campus_access_pod: C3-POD3
      #bgp_as: 65150 # Overriden automatic allocation for this leaf pair
      nodes:
        - name: c3-leaf5
          id: 136
          mgmt_ip: 192.168.0.135/24
          uplink_switch_interfaces: [Ethernet5, Ethernet5]
        - name: c3-leaf6
          id: 137
          mgmt_ip: 192.168.0.136/24
          uplink_switch_interfaces: [Ethernet6, Ethernet6]
    - group: c3-borderleafs
      bgp_as: 65320 # Overriden automatic allocation for BorderLeafs
      nodes:
        - name: c3-borderleaf1
          id: 138
          mgmt_ip: 192.168.0.137/24
          uplink_switch_interfaces: [Ethernet7, Ethernet7]
        - name: c3-borderleaf2
          id: 139
          mgmt_ip: 192.168.0.138/24
          uplink_switch_interfaces: [Ethernet8, Ethernet8]
