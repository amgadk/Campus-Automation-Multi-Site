# testing/catalog.yml
# Full department connectivity matrix: every host in every campus is
# tested (ICMP, TCP, UDP, Telnet) against the representative host of each
# department in its own campus, including its own department, so both
# cross-department and intra-department reachability are verified.
# Generated - see Makefile `test` target for per-campus selection.
